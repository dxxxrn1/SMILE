<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - SMILE</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-card__header">
        <h1 class="auth-card__title">Reset Password</h1>
        <p class="auth-card__subtitle">Enter your new password below</p>
      </div>

      <form id="resetForm" class="form" novalidate>
        <div class="form__group">
          <label for="newPassword" class="form__label">New Password</label>
          <input type="password" id="newPassword" class="form__input" placeholder="Enter new password" required minlength="8">
          <span class="form__error">Password must be at least 8 characters</span>
        </div>

        <div class="form__group">
          <label for="confirmPassword" class="form__label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form__input" placeholder="Confirm new password" required>
          <span class="form__error">Passwords do not match</span>
        </div>

        <button type="submit" class="btn btn--gradient form__submit">Reset Password</button>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const accountType = params.get('type');

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.form__submit');

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 8) {
        document.getElementById('newPassword').closest('.form__group').classList.add('form__group--error');
        return;
      }

      if (newPassword !== confirmPassword) {
        document.getElementById('confirmPassword').closest('.form__group').classList.add('form__group--error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      const res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, accountType, newPassword })
      });

      const data = await res.json();

      if (res.status === 200) {
        btn.textContent = 'Password reset! Redirecting...';
        setTimeout(() => window.location.href = '/login-page', 2000);
      } else {
        btn.textContent = data.message;
        btn.style.opacity = '0.7';
      }
    });
  </script>
</body>
</html>
