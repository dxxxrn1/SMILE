<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Moderation - SMILE Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../css/admin-dash.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1 class="logo">SMILE</h1>
          <span class="logo-subtitle">Admin Control Center</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard" class="nav-item">
            <span class="nav-icon"></span> Dashboard (Approvals)
          </a>
          <a href="/admin/user-moderation" class="nav-item active">
            <span class="nav-icon"></span> User Moderation
          </a>
          <a href="/admin/userTicket" class="nav-item">
            <span class="nav-icon"></span> Tickets (Reports)
          </a>
          <hr
            style="border-top: 1px solid var(--color-border); margin: 12px 0"
          />
          <a
            href="/logout"
            id="logout"
            class="nav-item"
            style="color: var(--color-danger)"
          >
            <span class="nav-icon"></span> Log Out
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div class="header-title">
            <h2>User Moderation</h2>
            <p class="header-subtitle">
              Manage student and organization accounts on the platform
            </p>
          </div>
          <div class="header-stats">
            <div class="stat-card">
              <span
                class="stat-value"
                id="total-users-count"
                style="color: var(--color-primary)"
                >0</span
              >
              <span class="stat-label">Total Users</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" style="color: var(--color-danger)"
                >0</span
              >
              <span class="stat-label">Suspended</span>
            </div>
          </div>
        </header>

        <section class="filters-section">
          <input
            type="text"
            placeholder="Search by name or email..."
            class="search-input"
          />
          <select class="status-select">
            <option value="all">All Roles</option>
            <option value="student">Students</option>
            <option value="org">Organizations</option>
          </select>
          <select class="status-select">
            <option value="all">All Statuses</option>
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
          </select>
        </section>

        <section class="table-section">
          <table class="org-table">
            <thead>
              <tr>
                <th>User / Email</th>
                <th>Role</th>
                <th>Joined Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr>
                <td colspan="5" style="text-align: center; padding: 2rem">
                  Loading users...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="../jsFrontEnd/admindashboard.js"></script>
    <script src="../jsFrontEnd/userModeration.js"></script>
  </body>
</html>
