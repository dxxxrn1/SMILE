<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - SMILE</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-card__header">
        <h1 class="auth-card__title">Forgot Password</h1>
        <p class="auth-card__subtitle">Enter your email and we'll send you a reset link</p>
      </div>

      <form id="forgotForm" class="form" novalidate>
        <div class="form__group">
          <label class="form__label">Account Type</label>
          <select id="accountType" class="form__input form__select">
            <option value="student">Student</option>
            <option value="organization">Organization</option>
          </select>
        </div>

        <div class="form__group">
          <label for="email" class="form__label">Email Address</label>
          <input type="email" id="email" class="form__input" placeholder="Enter your email" required>
          <span class="form__error">Please enter a valid email</span>
        </div>

        <button type="submit" class="btn btn--gradient form__submit">Send Reset Link</button>
      </form>

      <p class="auth-card__footer">
        Remember your password? <a href="/login-page">Log in</a>
      </p>
    </div>
  </main>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.form__submit');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const email = document.getElementById('email').value.trim();
      const accountType = document.getElementById('accountType').value;

      const res = await fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, accountType })
      });

      const data = await res.json();
      btn.textContent = data.message;
      btn.style.opacity = '0.7';
    });
  </script>
</body>
</html>
