<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support & Reports - SMILE Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../css/admin-dash.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1 class="logo">SMILE</h1>
          <span class="logo-subtitle">Admin Control Center</span>
        </div>
        <nav class="sidebar-nav">
          <a href="/admin/dashboard" class="nav-item">
            <span class="nav-icon"></span> Dashboard (Approvals)
          </a>
          <a href="/admin/user-moderation" class="nav-item">
            <span class="nav-icon"></span> User Moderation
          </a>
          <a href="/admin/tickets" class="nav-item active">
            <span class="nav-icon"></span> Tickets (Reports)
          </a>
          <a href="/admin/audit-logs" class="nav-item">
            <span class="nav-icon"></span> Audit Logs
          </a>
          <hr
            style="border-top: 1px solid var(--color-border); margin: 12px 0"
          />
          <a
            href="/logout"
            id="logout"
            class="nav-item"
            style="color: var(--color-danger)"
          >
            <span class="nav-icon"></span> Log Out
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div class="header-title">
            <h2>Support & Reports</h2>
            <p class="header-subtitle">
              Handle app issues and flagged content from users
            </p>
          </div>
          <div class="header-stats">
            <div class="stat-card">
              <span
                class="stat-value"
                id="open-tickets-count"
                style="color: var(--color-warning)"
                >0</span
              >
              <span class="stat-label">Open Tickets</span>
            </div>
            <div class="stat-card">
              <span
                class="stat-value"
                id="resolved-tickets-count"
                style="color: var(--color-success)"
                >0</span
              >
              <span class="stat-label">Resolved</span>
            </div>
          </div>
        </header>

        <section class="filters-section">
          <input
            type="text"
            placeholder="Search ticket ID or subject..."
            class="search-input"
          />
          <select class="status-select">
            <option value="all">All Types</option>
            <option value="report">Reported Content</option>
            <option value="bug">App Bug / Issue</option>
          </select>
          <select class="status-select">
            <option value="all">All Statuses</option>
            <option value="open">Open</option>
            <option value="resolved">Resolved</option>
          </select>
        </section>

        <section class="table-section">
          <table class="org-table">
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>Type</th>
                <th>Subject / Reason</th>
                <th>Reported By</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tickets-table-body">
              <tr>
                <td colspan="6" style="text-align: center; padding: 2rem">
                  No open tickets.
                </td>
              </tr>
            </tbody>
          </table>
        </section>
        
        <!-- Back to Top Button for Table -->
        <div style="text-align: center; margin-top: 1rem; display: flex; justify-content: center; align-items: center;">
          <button id="backToTopTableBtn" onclick="document.querySelector('.table-section').scrollTo({ top: 0, behavior: 'smooth' })" class="btn btn-secondary" style="
                display: none;
                align-items: center;
                gap: 6px;
                padding: 8px 16px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
              ">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
            Back to Top
          </button>
        </div>
      </main>
    </div>
    <script src="../jsFrontEnd/admindashboard.js"></script>
  </body>
</html>
