<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload School Document</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="documentScanner.css">
  <script src="/scanner/documentScannerMobile.js" defer></script>
</head>
<body class="scanner-page dashboard-page">
  <header class="scanner-mobile-header">
    <a href="/" class="scanner-mobile-logo">
      <span>&#9786;</span>
      SMILE
    </a>
  </header>

  <main class="mobile-shell">
    <section class="scanner-card scanner-card--mobile">
      <span class="scanner-badge">Phone scanner</span>
      <h1>Capture the school document</h1>
      <p class="lead">Take a clear photo of the report, transcript, certificate, or results page.</p>

      <form id="uploadForm" class="upload-form">
        <label class="file-drop" for="documentFile">
          <span>Tap to open camera or choose file</span>
          <small>JPG, PNG, WEBP, or PDF</small>
        </label>
        <input id="documentFile" name="document" type="file" accept="image/*,application/pdf" capture="environment" required>

        <button type="submit">Send To Website</button>
      </form>

      <p id="mobileStatus" class="mobile-status">Waiting for document...</p>
    </section>
  </main>
</body>
</html>
