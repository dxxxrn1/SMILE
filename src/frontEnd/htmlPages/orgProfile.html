<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - SMILE Org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    :root {
      --color-primary: #ec4899;
      --color-primary-hover: #db2777;
      --color-background: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e5e7eb;
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-muted: #6b7280;
      --border-radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar__logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
      text-decoration: none;
    }

    .topbar__back {
      font-size: 14px;
      color: var(--color-text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .topbar__back:hover {
      color: var(--color-primary);
    }


    .profile-container {
      max-width: 600px;
      width: 90%;
      margin: 40px auto;
      background: var(--color-surface);
      border-radius: var(--border-radius);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      border: 1px solid var(--color-border);
    }

    .profile-header {
      padding: 24px;
      border-bottom: 1px solid var(--color-border);
      background: linear-gradient(180deg, rgba(236, 72, 153, 0.08) 0%, rgba(249, 250, 251, 0) 100%);
    }

    .profile-header h2 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .profile-header p {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-top: 6px;
    }

    .profile-body {
      padding: 24px;
    }


    .pfp-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px dashed var(--color-border);
    }

    .pfp-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
    }

    .pfp-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background-color: #ffffff;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--color-text-primary);
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.15);
    }

    .form-input:disabled {
      background-color: #f3f4f6;
      color: var(--color-text-muted);
      cursor: not-allowed;
      border-style: dashed;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 140px;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .profile-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: #f9fafb;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-secondary {
      background: #ffffff;
      border: 1px solid var(--color-border);
      color: var(--color-text-primary);
    }

    .btn-secondary:hover {
      background: #f3f4f6;
    }

    .btn--gradient {
      background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
      color: white;
      font-weight: 600;
    }

    .btn--gradient:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2);
    }

    .btn--gradient:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <nav class="topbar">
    <a href="/" class="topbar__logo" style="display: flex; align-items: center; text-decoration: none;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        style="margin-right: 6px; flex-shrink: 0; color: var(--color-primary);">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
        <line x1="9" y1="9" x2="9.01" y2="9" />
        <line x1="15" y1="9" x2="15.01" y2="9" />
      </svg>
      <span style="font-size: 20px; font-weight: 700; color: var(--color-primary);">SMILE</span>
    </a>
    <a href="/org/dashboard" class="topbar__back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Back to Dashboard
    </a>
  </nav>

  <div class="profile-container">
    <div class="profile-header">
      <h2>Organisation Profile</h2>
      <p>Complete your profile page so that students can see your bio and logo.</p>
    </div>

    <form id="profileForm" class="profile-body">
      <div class="pfp-section">
        <div class="pfp-circle" id="pfpPreview">ORG</div>
        <div>
          <label for="pfpUpload" class="btn btn-secondary" style="display: inline-block">
            Upload Organisation Logo
          </label>
          <input type="file" id="pfpUpload" accept="image/*" style="display: none" />
          <p style="font-size: 12px; color: var(--color-text-muted); margin-top: 8px;">
            JPG, PNG or GIF. Max 2MB.
          </p>
        </div>
      </div>

      <div class="form-group">
        <label>Organisation Name</label>
        <input type="text" id="orgName" class="form-input" required />
      </div>

      <div class="input-grid">
        <div class="form-group">
          <label>Organisation Type</label>
          <input type="text" id="orgType" class="form-input" disabled />
        </div>
        <div class="form-group">
          <label>Province</label>
          <input type="text" id="orgProvince" class="form-input" disabled />
        </div>
      </div>

      <div class="form-group">
        <label>About Us / Bio</label>
        <textarea id="bio" class="form-input"
          placeholder="Tell students about your organisation's mission, values, and the impact you are making..."
          required></textarea>
      </div>
    </form>

    <div class="profile-footer">
      <button class="btn btn-secondary" onclick="window.history.back()">
        Cancel
      </button>
      <button class="btn btn--gradient" onclick="saveProfile()" id="saveBtn">
        Save Profile
      </button>
    </div>
  </div>

  <script>
    let selectedProfilePic = null;

    function authHeaders(extra = {}) {
      const token = getToken();
      return token ? { ...extra, Authorization: `Bearer ${token}` } : extra;
    }

    // 1. Profile picture selection & preview
    document.getElementById("pfpUpload").addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (file) {
        if (!file.type.startsWith("image/")) {
          alert("Please select a valid image file.");
          event.target.value = "";
          return;
        }

        if (file.size > 2 * 1024 * 1024) {
          alert("Image size must be smaller than 2MB.");
          event.target.value = "";
          return;
        }

        const reader = new FileReader();
        reader.onload = function (e) {
          selectedProfilePic = e.target.result;
          document.getElementById("pfpPreview").innerHTML =
            `<img src="${e.target.result}" alt="Organisation Logo">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // 2. Load profile on page open
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const response = await fetch("/api/org/profile", {
          headers: authHeaders()
        });
        const data = await response.json();

        if (data.success) {
          const org = data.profile;
          document.getElementById("orgName").value = org.OrgName || "";
          document.getElementById("orgType").value = org.Type || "Organisation";
          document.getElementById("orgProvince").value = org.Province || "Not Specified";
          document.getElementById("bio").value = org.OrgBio || "";

          // No localStorage storage of sensitive keys

          if (org.OrgProfilePic) {
            document.getElementById("pfpPreview").innerHTML =
              `<img src="${org.OrgProfilePic}" alt="Organisation Logo">`;
          } else if (org.OrgName) {
            document.getElementById("pfpPreview").textContent = org.OrgName.substring(0, 2).toUpperCase();
          }
        } else {
          console.error("Failed to load profile:", data.message);
        }
      } catch (err) {
        console.error("Could not load organisation profile", err);
      }
    });

    // 3. Save profile
    async function saveProfile() {
      const orgName = document.getElementById("orgName").value.trim();
      const bio = document.getElementById("bio").value.trim();

      if (!orgName || !bio) {
        alert("Please enter Organisation Name and About Us bio.");
        return;
      }

      const saveBtn = document.getElementById("saveBtn");
      saveBtn.textContent = "Saving...";
      saveBtn.disabled = true;

      try {
        const response = await fetch("/api/org/profile", {
          method: "PUT",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({
            orgName,
            bio,
            profilePic: selectedProfilePic
          })
        });

        const data = await response.json();

        if (data.success) {
          alert("Organisation Profile saved successfully!");
          window.location.href = "/org/dashboard";
        } else {
          alert(data.message || "Failed to save profile.");
          saveBtn.textContent = "Save Profile";
          saveBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        alert("An error occurred. Please try again.");
        saveBtn.textContent = "Save Profile";
        saveBtn.disabled = false;
      }
    }
  </script>
</body>

</html>
