<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your SMILE account to access opportunities and resources for South African youth.">
  <title>Log In - SMILE</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <!-- Header / Navigation -->
  <header class="header">
    <nav class="nav container">
      <a href="/" class="nav__logo">
        <span class="nav__logo-icon">&#9786;</span>
        <span>SMILE</span>
      </a>
      
      <ul class="nav__menu" id="navMenu">
        <li><a href="/" class="nav__link">
          <!-- <span class="nav__link-icon">&#127968;</span> Home -->
        </a></li>
      </ul>
      
      <div class="nav__actions">
        <a href="/login-page" class="btn btn--outline">Log In</a>
        <a href="/register-page" class="btn btn--primary">Sign Up</a>
      </div>
      
      <button class="nav__mobile-toggle" id="mobileToggle" aria-label="Toggle navigation menu">
        &#9776;
      </button>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">

      <div class="auth-card__header">
        <h1 class="auth-card__title">Log In</h1>
        <p class="auth-card__subtitle">Choose your account type</p>
      </div>

      <!-- Account Type Selector -->
      <div class="account-type-selector">
        <button type="button" class="account-type-card account-type-card--active" data-type="student">
          <div class="account-type-card__icon account-type-card__icon--student">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
          </div>
          <span class="account-type-card__label">Student</span>
        </button>
        <button type="button" class="account-type-card" data-type="organization">
          <div class="account-type-card__icon account-type-card__icon--organization">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21h18"/>
              <path d="M5 21V7l8-4v18"/>
              <path d="M19 21V11l-6-4"/>
              <path d="M9 9v.01"/>
              <path d="M9 12v.01"/>
              <path d="M9 15v.01"/>
              <path d="M9 18v.01"/>
            </svg>
          </div>
          <span class="account-type-card__label">Organization</span>
        </button>
        <!-- <button type="button" class="account-type-card" data-type="admin">
          <div class="account-type-card__icon account-type-card__icon--admin">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span class="account-type-card__label">Admin</span>
      </button> -->
      </div>

      <form id="loginForm" class="form" novalidate>
        <input type="hidden" id="accountType" name="accountType" value="student">

        <div class="form__group">
          <label for="email" class="form__label">Email Address</label>
          <input type="email" id="email" name="email" class="form__input" placeholder="Enter your email" required autocomplete="email">
          <span class="form__error">Please enter a valid email address</span>
        </div>

        <div class="form__group">
          <label for="password" class="form__label">Password</label>
          <input type="password" id="password" name="password" class="form__input" placeholder="Enter your password" required autocomplete="current-password">
          <span class="form__error">Password is required</span>
        </div>

        <div class="form__actions">
          <div class="form__checkbox">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="/forgot-password" class="form__forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn--gradient form__submit">
          Log In
        </button>

      </form>

      <p class="auth-card__footer">
        Don&apos;t have an account? <a href="/register-page">Sign up for free</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__content">
        <a href="/" class="footer__logo">
          <span class="nav__logo-icon">&#9786;</span>
          <span>SMILE</span>
        </a>
        <nav class="footer__links">
          <a href="#" class="footer__link">About Us</a>
          <a href="#" class="footer__link">Contact</a>
          <a href="#" class="footer__link">Privacy Policy</a>
          <a href="#" class="footer__link">Terms of Service</a>
        </nav>
        <p class="footer__copy">&copy; 2026 SMILE. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../jsFrontEnd/auth.js"></script>
</body>
</html>
