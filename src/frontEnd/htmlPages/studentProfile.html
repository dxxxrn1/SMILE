<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - SMILE Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Borrowing the exact CSS variables from your Admin Modal */
      :root {
        --color-primary: #ec4899;
        --color-primary-hover: #db2777;
        --color-background: #f8fafc;
        --color-surface: #ffffff;
        --color-border: #e2e8f0;
        --color-text-primary: #0f172a;
        --color-text-secondary: #64748b;
        --color-text-muted: #94a3b8;
        --border-radius: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--color-background);
        color: var(--color-text-primary);
      }

      /* Top Navigation */
      .topbar {
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border);
        padding: 16px 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .topbar__logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        text-decoration: none;
      }
      .topbar__back {
        font-size: 14px;
        color: var(--color-text-secondary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Profile Container (Styled exactly like your Admin Modal) */
      .profile-container {
        max-width: 600px;
        margin: 40px auto;
        background: var(--color-surface);
        border-radius: var(--border-radius);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border: 1px solid var(--color-border);
      }

      .profile-header {
        padding: 24px;
        border-bottom: 1px solid var(--color-border);
      }
      .profile-header h2 {
        font-size: 20px;
        font-weight: 600;
      }
      .profile-header p {
        font-size: 14px;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .profile-body {
        padding: 24px;
      }

      /* Profile Picture Section */
      .pfp-section {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
      }
      .pfp-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 600;
        overflow: hidden;
      }
      .pfp-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Form Inputs */
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        outline: none;
        border-color: var(--color-primary);
      }
      textarea.form-input {
        resize: vertical;
        min-height: 120px;
      }

      /* Grid for side-by-side inputs */
      .input-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .profile-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--color-border);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: var(--color-background);
      }

      /* Buttons */
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-secondary {
        background: white;
        border: 1px solid var(--color-border);
        color: var(--color-text-secondary);
      }
      .btn--gradient {
        background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
        color: white;
      }
      .btn--gradient:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a href="/" class="topbar__logo">&#9786; SMILE</a>
      <a href="/student/dashboard" class="topbar__back">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back to Dashboard
      </a>
    </nav>

    <div class="profile-container">
      <div class="profile-header">
        <h2>Complete Your Profile</h2>
        <p>
          Organizations will see this information when apply for opportunities.
          . .
        </p>
      </div>

      <form id="profileForm" class="profile-body">
        <div class="pfp-section">
          <div class="pfp-circle" id="pfpPreview">TM</div>
          <div>
            <label
              for="pfpUpload"
              class="btn btn-secondary"
              style="display: inline-block"
              >Upload New Photo</label
            >
            <input
              type="file"
              id="pfpUpload"
              accept="image/*"
              style="display: none"
            />
            <p
              style="
                font-size: 12px;
                color: var(--color-text-muted);
                margin-top: 8px;
              "
            >
              JPG, PNG or GIF. Max 2MB.
            </p>
          </div>
        </div>

        <div class="input-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" class="form-input" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" class="form-input" required />
          </div>
        </div>

        <div class="form-group">
          <label>Current Education Level</label>
          <select id="educationLevel" class="form-input" required>
            <option value="">Select level...</option>
            <option value="Grade 11">Grade 11</option>
            <option value="Grade 12">Grade 12 / Matric</option>
            <option value="Diploma">Diploma / Certificate</option>
            <option value="Degree">Undergraduate Degree</option>
          </select>
        </div>

        <div class="form-group">
          <label>Personal Bio</label>
          <textarea
            id="bio"
            class="form-input"
            placeholder="Tell organizations about your skills, interests, and what kind of opportunities you are looking for..."
            required
          ></textarea>
        </div>
      </form>

      <div class="profile-footer">
        <button class="btn btn-secondary" onclick="window.history.back()">
          Cancel
        </button>
        <button class="btn btn--gradient" onclick="saveProfile()">
          Save Profile
        </button>
      </div>
    </div>

    <script>
      // 1.  Profile Picture preview
      document
        .getElementById("pfpUpload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              document.getElementById("pfpPreview").innerHTML =
                `<img src="${e.target.result}" alt="Profile Picture">`;
            };
            reader.readAsDataURL(file);
          }
        });

      // 2.  existing data when page opens
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const response = await fetch("/api/student/profile"); // verifyToken cookie handles auth!
          const data = await response.json();

          if (data.success) {
            const p = data.profile;
            document.getElementById("firstName").value = p.StuName || "";
            document.getElementById("lastName").value = p.StuLastName || "";
            document.getElementById("educationLevel").value =
              p.StuEducationLevel || "";
            document.getElementById("bio").value = p.StuBio || "";

            if (p.StuName && p.StuLastName) {
              document.getElementById("pfpPreview").textContent =
                p.StuName[0] + p.StuLastName[0];
            }
          }
        } catch (err) {
          console.error("Could not load profile", err);
        }
      });

      async function saveProfile() {
        const payload = {
          firstName: document.getElementById("firstName").value.trim(),
          lastName: document.getElementById("lastName").value.trim(),
          educationLevel: document.getElementById("educationLevel").value,
          bio: document.getElementById("bio").value.trim(),
        };

        if (!payload.firstName || !payload.lastName || !payload.bio) {
          alert("Please fill in all fields before saving.");
          return;
        }

        const saveBtn = document.querySelector(".btn--gradient");
        saveBtn.textContent = "Saving...";
        saveBtn.disabled = true;

        try {
          const response = await fetch("/api/student/profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (data.success) {
            localStorage.setItem("profileComplete", "true"); //they are good to go!
            alert(
              "Profile Saved! You are now ready to apply for opportunities.",
            );
            window.location.href = "/near/me";
          } else {
            alert(data.message || "Failed to save profile.");
            saveBtn.textContent = "Save Profile";
            saveBtn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          alert("Server error. Please try again.");
          saveBtn.textContent = "Save Profile";
          saveBtn.disabled = false;
        }
      }
    </script>
  </body>
</html>
